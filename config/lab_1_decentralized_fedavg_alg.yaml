hyperparameters:
  client:
    batch_size: 256
    local_epochs: 10
    loss: CrossEntropyLoss
    optimizer:
      name: AdamW
      lr: 1e-3
      weight_decay: 1e-5
    persistency: true
    scheduler:
      gamma: 1
      step_size: 1
  model: MNIST_2NN
  server:
    weighted: true
    lr: 1.0
    neighbors: 4
    consensus_steps: 5
name: fluke.algorithms.decentralized.DecentralizedFedAvg
