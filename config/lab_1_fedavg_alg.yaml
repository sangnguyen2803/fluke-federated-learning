hyperparameters:
  client:
    batch_size: 256
    local_epochs: 30
    loss: CrossEntropyLoss
    optimizer:
      name: AdamW
      lr: 1e-3
      # momentum: 0.9
      weight_decay: 1.0e-04
    persistency: true
    scheduler:
      gamma: 1
      step_size: 1
  model: MNIST_2NN
  server:
    weighted: true
name: fluke.algorithms.fedavg.FedAVG
