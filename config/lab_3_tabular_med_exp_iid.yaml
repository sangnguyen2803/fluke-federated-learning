data:
  client_split: 0.5
  dataset:
    # This dataset has no patient_id (only age, gender, education level & income)
    # Need to be changed to compare HFL & VFL
    name: dataset.Med_data.CARDIO_DATASET
    path: ./data
  distribution:
    name: iid
  keep_test : true
  sampling_perc: 1.0
  server_split: 0.0
  server_test: true
  uniform_test: false
eval:
  eval_every: 1
  locals: true
  post_fit: true
  pre_fit: true
  server: true
  task: classification
exp:
  device: cpu
  seed: 42
logger:
  name: CsvLog
  log_dir: runs/lab_3_med_experiment_iid_mlp
protocol:
  eligible_perc: 1.0
  n_clients: 10
  n_rounds: 50