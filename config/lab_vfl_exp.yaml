# ── Experiment configuration for Vertical Federated Learning (VFL) ────────
# Uses the Cardiovascular Disease dataset (cardio_train.csv)
# Features are split vertically across clients (each gets a subset of columns)

data:
  dataset:
    name: dataset.Med_data.CARDIO_DATASET
    path: ./data
  feature_splits:
    - [0, 1, 2, 3]      # Client 0: age, gender, height, weight
    - [4, 5, 6, 7]      # Client 1: ap_hi, ap_lo, cholesterol, gluc
    - [8, 9, 10] 
  distribution:
    name: iid  # not used in VFL, but required by config validation
  client_split: 0.0
  keep_test: true
  sampling_perc: 1.0
  server_split: 0.0
  server_test: true
  uniform_test: false
eval:
  eval_every: 1
  locals: false        # client-side eval doesn't make sense in VFL (clients have no labels)
  post_fit: true
  pre_fit: true
  server: true         # server evaluates end-to-end (bottom models + top model)
  task: classification
exp:
  device: cpu
  seed: 42
logger:
  name: CsvLog
  log_dir: runs/lab_vfl_cardio
protocol:
  eligible_perc: 1.0
  n_clients: 3          # cardio has 11 features -> split into 3 clients (4+4+3 features)
  n_rounds: 50
