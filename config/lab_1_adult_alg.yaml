hyperparameters:
  client:
    batch_size: 256
    local_epochs: 10
    loss: CrossEntropyLoss
    optimizer:
      name: AdamW
      lr: 1e-3
      # momentum: 0.9
      weight_decay: 1.0e-04
    persistency: true
    scheduler:
      gamma: 1
      step_size: 1
  model: Adult_LogReg
  net_args:
    input_dim: 14
  server:
    weighted: true
    lr: 1.0
name: fluke.algorithms.fedavg.FedAVG
